services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cyncer
    volumes:
      - ./my-app:/app
      - /app/node_modules

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyncer
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
